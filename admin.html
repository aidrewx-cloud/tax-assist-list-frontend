<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tax Assist List — Lead Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue: #0066CC;
      --blue-hover: #0052A3;
      --blue-light: #EBF8FF;
      --teal: #0F766E;
      --teal-bg: #f0fdfa;
      --gold: #F59E0B;
      --gold-bg: #fffbeb;
      --dark: #1F2937;
      --gray: #6B7280;
      --gray-light: #F3F4F6;
      --gray-border: #E5E7EB;
      --white: #FFFFFF;
      --green: #10B981;
      --green-bg: #ecfdf5;
      --red: #EF4444;
      --red-bg: #fef2f2;
      --purple: #8B5CF6;
      --purple-bg: #f5f3ff;
      --yellow: #F59E0B;
      --yellow-bg: #fffbeb;
      --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--dark);
      background: var(--gray-light);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0066CC 0%, #0052A3 100%);
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--dark);
    }
    .login-card .subtitle {
      color: var(--gray);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gray-border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    .login-card input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--blue-hover); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      background: var(--red-bg);
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }

    /* ── DASHBOARD ── */
    .dashboard { display: none; }
    .dashboard.active { display: block; }

    /* Top bar */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--gray-border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-brand {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-brand svg { width: 22px; height: 22px; color: var(--blue); }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-user {
      font-size: 13px;
      color: var(--gray);
      font-weight: 500;
    }
    .btn-logout {
      padding: 7px 16px;
      background: none;
      border: 1.5px solid var(--gray-border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* Content */
    .content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px;
    }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--gray-border);
    }
    .kpi-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.02em;
    }
    .kpi-card.blue .kpi-value { color: var(--blue); }
    .kpi-card.teal .kpi-value { color: var(--teal); }
    .kpi-card.gold .kpi-value { color: var(--gold); }
    .kpi-card.green .kpi-value { color: var(--green); }

    /* Filters bar */
    .filters-bar {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-border);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-input, .filter-select {
      padding: 9px 14px;
      border: 1.5px solid var(--gray-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-input:focus, .filter-select:focus { border-color: var(--blue); }
    .filter-input { min-width: 220px; }
    .filter-select { min-width: 140px; }
    .btn-refresh {
      margin-left: auto;
      padding: 9px 18px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-refresh:hover { background: var(--blue-hover); }

    /* Table */
    .table-wrap {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-border);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead { background: var(--gray-light); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--gray);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      border-bottom: 1px solid var(--gray-border);
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-border);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(0,102,204,0.02); }
    .lead-name { font-weight: 600; color: var(--dark); }
    .lead-email { color: var(--gray); font-size: 12px; }
    .lead-phone { color: var(--gray); }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .badge-new { background: var(--blue-light); color: var(--blue); }
    .badge-contacted { background: var(--yellow-bg); color: #B45309; }
    .badge-qualified { background: var(--purple-bg); color: var(--purple); }
    .badge-converted { background: var(--green-bg); color: var(--teal); }
    .badge-lost { background: var(--red-bg); color: var(--red); }

    .btn-view {
      padding: 6px 14px;
      background: none;
      border: 1.5px solid var(--blue);
      border-radius: 6px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-view:hover { background: var(--blue); color: white; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--gray-border);
    }
    .pagination-info { font-size: 13px; color: var(--gray); }
    .pagination-btns { display: flex; gap: 8px; }
    .btn-page {
      padding: 7px 14px;
      background: none;
      border: 1.5px solid var(--gray-border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--dark);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-page:hover { border-color: var(--blue); color: var(--blue); }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-page.active { background: var(--blue); color: white; border-color: var(--blue); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--gray);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--dark); margin-bottom: 4px; }
    .empty-state p { font-size: 14px; }

    /* ── LEAD DETAIL MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-panel {
      width: 480px;
      max-width: 100%;
      height: 100vh;
      background: var(--white);
      overflow-y: auto;
      box-shadow: -8px 0 30px rgba(0,0,0,0.12);
      animation: slideIn 0.25s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1;
    }
    .modal-header h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .btn-close-modal {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--gray-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-close-modal:hover { background: var(--gray-border); }
    .modal-body { padding: 24px; }
    .detail-section {
      margin-bottom: 24px;
    }
    .detail-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--gray);
      margin-bottom: 12px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-light);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      flex-shrink: 0;
    }
    .detail-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      text-align: right;
      word-break: break-word;
    }

    /* Status update in modal */
    .status-update {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .status-select {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .status-select:focus { border-color: var(--blue); }
    .btn-update-status {
      padding: 10px 18px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-update-status:hover { background: var(--blue-hover); }

    /* Notes textarea */
    .notes-area {
      width: 100%;
      min-height: 80px;
      padding: 12px 14px;
      border: 1.5px solid var(--gray-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      margin-bottom: 10px;
    }
    .notes-area:focus { border-color: var(--blue); }
    .btn-save-notes {
      padding: 8px 16px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-save-notes:hover { background: #0D5E59; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--dark);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Loading spinner */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--gray-border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 20px 16px; }
      .modal-panel { width: 100%; }
    }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .filters-bar { flex-direction: column; }
      .filter-input, .filter-select { width: 100%; min-width: 0; }
      .btn-refresh { margin-left: 0; width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div class="login-wrapper" id="loginScreen">
  <div class="login-card">
    <h1>Tax Assist List</h1>
    <p class="subtitle">Sign in to your lead dashboard</p>
    <div class="login-error" id="loginError"></div>
    <form onsubmit="handleLogin(event)">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required placeholder="admin" autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Enter password" autocomplete="current-password">
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>
  </div>
</div>

<!-- ══════════════ DASHBOARD ══════════════ -->
<div class="dashboard" id="dashboard">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Tax Assist List
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser">admin</span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 class="page-title">Lead Dashboard</h1>

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">Total Leads</div>
        <div class="kpi-value" id="kpiTotal">—</div>
      </div>
      <div class="kpi-card teal">
        <div class="kpi-label">New Today</div>
        <div class="kpi-value" id="kpiToday">—</div>
      </div>
      <div class="kpi-card gold">
        <div class="kpi-label">Contacted</div>
        <div class="kpi-value" id="kpiContacted">—</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Converted</div>
        <div class="kpi-value" id="kpiConverted">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input type="text" class="filter-input" id="filterSearch" placeholder="Search by name, email, or phone..." oninput="debounceSearch()">
      <select class="filter-select" id="filterStatus" onchange="loadLeads()">
        <option value="all">All Statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="qualified">Qualified</option>
        <option value="converted">Converted</option>
        <option value="lost">Lost</option>
      </select>
      <select class="filter-select" id="filterSource" onchange="loadLeads()">
        <option value="all">All Sources</option>
        <option value="Google Ads">Google Ads</option>
        <option value="Meta Ads">Meta Ads</option>
        <option value="TikTok">TikTok</option>
        <option value="Organic">Organic</option>
        <option value="Direct">Direct</option>
      </select>
      <button class="btn-refresh" onclick="loadLeads()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Lead</th>
              <th>Phone</th>
              <th>Debt Amount</th>
              <th>Company</th>
              <th>Source</th>
              <th>Status</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="leadsTableBody">
            <tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination" style="display:none;">
        <div class="pagination-info" id="paginationInfo"></div>
        <div class="pagination-btns" id="paginationBtns"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ LEAD DETAIL MODAL ══════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="modalTitle">Lead Details</h2>
      <button class="btn-close-modal" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:5000' : '';
  let token = localStorage.getItem('tal_token') || '';
  let currentUser = localStorage.getItem('tal_user') || 'admin';
  let currentPage = 1;
  const PAGE_SIZE = 15;
  let searchTimer;

  // ── AUTH ──
  if (token) showDashboard();

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch(API + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        token = data.token;
        currentUser = data.user?.username || 'admin';
        localStorage.setItem('tal_token', token);
        localStorage.setItem('tal_user', currentUser);
        showDashboard();
      } else {
        errEl.textContent = data.message || 'Invalid credentials';
        errEl.style.display = 'block';
      }
    } catch (err) {
      errEl.textContent = 'Cannot connect to server. Is the backend running?';
      errEl.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }

  function logout() {
    token = '';
    localStorage.removeItem('tal_token');
    localStorage.removeItem('tal_user');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').classList.remove('active');
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    document.getElementById('topbarUser').textContent = currentUser;
    loadLeads();
    loadKPIs();
  }

  // ── API HELPERS ──
  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── DEBT AMOUNT LABELS ──
  const debtLabels = {
    '10k_25k': '$10K – $25K',
    '25k_50k': '$25K – $50K',
    '50k_100k': '$50K – $100K',
    '100k_250k': '$100K – $250K',
    '250k_plus': '$250K+'
  };
  const taxTypeLabels = {
    'federal_irs': 'Federal IRS',
    'state': 'State Tax',
    'both': 'Federal & State',
    'business': 'Business Tax',
    'other': 'Other'
  };

  // ── LOAD KPIs ──
  async function loadKPIs() {
    try {
      // Get all leads to compute KPIs client-side (simpler than analytics endpoint)
      const res = await fetch(API + '/api/leads?limit=1&page=1', { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) return;
      const total = data.pagination?.total || 0;
      document.getElementById('kpiTotal').textContent = total.toLocaleString();

      // Get status counts
      const counts = { new: 0, contacted: 0, qualified: 0, converted: 0, lost: 0, today: 0 };
      const today = new Date().toISOString().split('T')[0];

      // Fetch all to count — if few leads, this is fine
      if (total <= 500) {
        const all = await fetch(API + '/api/leads?limit=500', { headers: authHeaders() });
        const allData = await all.json();
        if (allData.data) {
          allData.data.forEach(l => {
            if (l.status) counts[l.status] = (counts[l.status] || 0) + 1;
            if (l.createdAt && l.createdAt.startsWith(today)) counts.today++;
          });
        }
      }
      document.getElementById('kpiToday').textContent = counts.today;
      document.getElementById('kpiContacted').textContent = counts.contacted + counts.qualified;
      document.getElementById('kpiConverted').textContent = counts.converted;
    } catch (err) {
      console.error('KPI load error:', err);
    }
  }

  // ── LOAD LEADS TABLE ──
  async function loadLeads() {
    const tbody = document.getElementById('leadsTableBody');
    tbody.innerHTML = '<tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>';

    const search = document.getElementById('filterSearch').value;
    const status = document.getElementById('filterStatus').value;
    const source = document.getElementById('filterSource').value;

    let url = API + '/api/leads?page=' + currentPage + '&limit=' + PAGE_SIZE + '&sortBy=createdAt&sortOrder=desc';
    if (status !== 'all') url += '&status=' + status;
    if (source !== 'all') url += '&source=' + encodeURIComponent(source);
    if (search) url += '&search=' + encodeURIComponent(search);

    try {
      const res = await fetch(url, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      if (!data.data || data.data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <h3>No leads found</h3>
            <p>Try adjusting your filters or wait for new submissions.</p>
          </div>
        </td></tr>`;
        document.getElementById('pagination').style.display = 'none';
        return;
      }

      tbody.innerHTML = data.data.map(lead => `
        <tr>
          <td>
            <div class="lead-name">${esc(lead.fullName || lead.firstName + ' ' + lead.lastName)}</div>
            <div class="lead-email">${esc(lead.email)}</div>
          </td>
          <td class="lead-phone">${esc(formatPhone(lead.phone))}</td>
          <td>${debtLabels[lead.debtAmount] || lead.debtAmount || '—'}</td>
          <td>${esc((lead.preferredCompanies || [])[0] || '—')}</td>
          <td>${esc(lead.source || '—')}</td>
          <td><span class="badge badge-${lead.status || 'new'}">${lead.status || 'new'}</span></td>
          <td>${formatDate(lead.createdAt)}</td>
          <td><button class="btn-view" onclick="viewLead('${lead._id}')">View</button></td>
        </tr>
      `).join('');

      // Pagination
      const pg = data.pagination;
      if (pg && pg.totalPages > 1) {
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('paginationInfo').textContent =
          `Showing ${(pg.page - 1) * pg.limit + 1}–${Math.min(pg.page * pg.limit, pg.total)} of ${pg.total} leads`;
        let btns = '';
        btns += `<button class="btn-page" onclick="goPage(${pg.page - 1})" ${pg.page <= 1 ? 'disabled' : ''}>Prev</button>`;
        for (let i = 1; i <= pg.totalPages && i <= 7; i++) {
          btns += `<button class="btn-page ${i === pg.page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        }
        btns += `<button class="btn-page" onclick="goPage(${pg.page + 1})" ${pg.page >= pg.totalPages ? 'disabled' : ''}>Next</button>`;
        document.getElementById('paginationBtns').innerHTML = btns;
      } else {
        document.getElementById('pagination').style.display = pg && pg.total > 0 ? 'flex' : 'none';
        document.getElementById('paginationInfo').textContent = pg ? `${pg.total} lead${pg.total !== 1 ? 's' : ''} total` : '';
        document.getElementById('paginationBtns').innerHTML = '';
      }
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="8">
        <div class="empty-state">
          <h3>Connection error</h3>
          <p>Could not reach the server. Is the backend running on port 5000?</p>
        </div>
      </td></tr>`;
    }
  }

  function goPage(p) { if (p >= 1) { currentPage = p; loadLeads(); } }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadLeads(); }, 300);
  }

  // ── VIEW LEAD DETAIL ──
  async function viewLead(id) {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalBody').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      const res = await fetch(API + '/api/leads/' + id, { headers: authHeaders() });
      const data = await res.json();
      if (!data.data) { document.getElementById('modalBody').innerHTML = '<p>Lead not found.</p>'; return; }
      const l = data.data;

      document.getElementById('modalTitle').textContent = l.fullName || (l.firstName + ' ' + l.lastName);
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-section">
          <div class="detail-section-title">Contact Information</div>
          <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${esc(l.fullName)}</span></div>
          <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value"><a href="mailto:${esc(l.email)}" style="color:var(--blue);text-decoration:none;">${esc(l.email)}</a></span></div>
          <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value"><a href="tel:${l.phone}" style="color:var(--blue);text-decoration:none;">${esc(formatPhone(l.phone))}</a></span></div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Tax Situation</div>
          <div class="detail-row"><span class="detail-label">Debt Amount</span><span class="detail-value">${debtLabels[l.debtAmount] || l.debtAmount || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Tax Type</span><span class="detail-value">${taxTypeLabels[l.taxDebtType] || l.taxDebtType || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Best Call Time</span><span class="detail-value">${esc(l.bestCallTime || '—')}</span></div>
          <div class="detail-row"><span class="detail-label">Company</span><span class="detail-value">${esc((l.preferredCompanies || [])[0] || '—')}</span></div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Status</div>
          <div class="status-update">
            <select class="status-select" id="statusSelect">
              <option value="new" ${l.status === 'new' ? 'selected' : ''}>New</option>
              <option value="contacted" ${l.status === 'contacted' ? 'selected' : ''}>Contacted</option>
              <option value="qualified" ${l.status === 'qualified' ? 'selected' : ''}>Qualified</option>
              <option value="converted" ${l.status === 'converted' ? 'selected' : ''}>Converted</option>
              <option value="lost" ${l.status === 'lost' ? 'selected' : ''}>Lost</option>
            </select>
            <button class="btn-update-status" onclick="updateStatus('${l._id}')">Update</button>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Notes</div>
          <textarea class="notes-area" id="notesArea" placeholder="Add notes about this lead...">${esc(l.notes || '')}</textarea>
          <button class="btn-save-notes" onclick="saveNotes('${l._id}')">Save Notes</button>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Tracking</div>
          <div class="detail-row"><span class="detail-label">Source</span><span class="detail-value">${esc(l.source || '—')}</span></div>
          <div class="detail-row"><span class="detail-label">UTM Source</span><span class="detail-value">${esc(l.utmSource || '—')}</span></div>
          <div class="detail-row"><span class="detail-label">UTM Medium</span><span class="detail-value">${esc(l.utmMedium || '—')}</span></div>
          <div class="detail-row"><span class="detail-label">UTM Campaign</span><span class="detail-value">${esc(l.utmCampaign || '—')}</span></div>
          <div class="detail-row"><span class="detail-label">Landing Page</span><span class="detail-value" style="font-size:11px;max-width:220px;overflow:hidden;text-overflow:ellipsis;">${esc(l.landingPage || '—')}</span></div>
          <div class="detail-row"><span class="detail-label">Submitted</span><span class="detail-value">${formatDateTime(l.createdAt)}</span></div>
          <div class="detail-row"><span class="detail-label">CRM Status</span><span class="detail-value">${esc(l.irslogicsStatus || 'pending')}</span></div>
        </div>
      `;
    } catch (err) {
      document.getElementById('modalBody').innerHTML = '<p>Error loading lead details.</p>';
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  // ── UPDATE STATUS ──
  async function updateStatus(id) {
    const status = document.getElementById('statusSelect').value;
    try {
      const res = await fetch(API + '/api/leads/' + id, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ status })
      });
      if (res.ok) {
        showToast('Status updated to ' + status);
        loadLeads();
        loadKPIs();
      } else {
        showToast('Failed to update status');
      }
    } catch (err) {
      showToast('Connection error');
    }
  }

  // ── SAVE NOTES ──
  async function saveNotes(id) {
    const notes = document.getElementById('notesArea').value;
    try {
      const res = await fetch(API + '/api/leads/' + id, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ notes })
      });
      if (res.ok) {
        showToast('Notes saved');
      } else {
        showToast('Failed to save notes');
      }
    } catch (err) {
      showToast('Connection error');
    }
  }

  // ── HELPERS ──
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function formatPhone(p) {
    if (!p) return '—';
    const d = p.replace(/\D/g, '');
    if (d.length === 10) return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6);
    if (d.length === 11 && d[0] === '1') return '(' + d.slice(1,4) + ') ' + d.slice(4,7) + '-' + d.slice(7);
    return p;
  }

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function formatDateTime(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  // Keyboard: Escape closes modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

</body>
</html>
